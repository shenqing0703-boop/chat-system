<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>在线客服</title>
    <script src="../firebase.js"></script>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; max-width: 500px; }
        #messages { height: 350px; border: 1px solid #ccc; overflow-y: auto; padding: 10px; margin-bottom: 10px; background: #f9f9f9; }
        #input-area { display: flex; }
        #msg-input { flex: 1; padding: 8px; border: 1px solid #ccc; }
        button { padding: 8px 20px; background: #00a854; color: white; border: none; margin-left: 5px; cursor: pointer; }
        button:hover { background: #008f47; }
    </style>
</head>
<body>

    <h3>在线咨询</h3>
    <div id="messages"></div>
    <div id="input-area">
        <input type="text" id="msg-input" placeholder="请输入您想咨询的问题..." onkeydown="if(event.keyCode==13) send()">
        <button onclick="send()">发送</button>
    </div>

    <script>
        // 为每个进来的粉丝生成一个专属的 ID（基于时间戳或本地缓存）
        let userId = localStorage.getItem("chat_user_id");
        if (!userId) {
            userId = "chat_" + Date.now();
            localStorage.setItem("chat_user_id", userId);
        }

        const box = document.getElementById("messages");

        // 实时监听与客服的对话
        db.ref("chats/" + userId + "/messages").on("child_added", snap => {
            const msg = snap.val();
            const div = document.createElement("div");
            div.style.margin = "10px 0";

            if (msg.sender === "user") {
                div.innerHTML = `<p style="text-align:right; margin:0;"><span style="background:#e6f7ff; padding:5px 10px; border-radius:4px; display:inline-block;">${msg.text}</span></p>`;
            } else {
                div.innerHTML = `<p style="text-align:left; margin:0;"><span style="background:#f6ffed; padding:5px 10px; border-radius:4px; display:inline-block;"><b>客服:</b> ${msg.text}</span></p>`;
            }

            box.appendChild(div);
            box.scrollTop = box.scrollHeight;
        });

        // 粉丝发送消息
        function send() {
            const input = document.getElementById("msg-input");
            const text = input.value.trim();
            if (!text) return;

            db.ref("chats/" + userId + "/messages").push({
                sender: "user",
                text: text,
                timestamp: Date.now()
            });
            input.value = "";
        }
    </script>
</body>
</html>
