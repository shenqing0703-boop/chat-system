<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>客服后台</title>
    
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    
    <script src="../firebase.js"></script>
    
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; display: flex; }
        #chat-list { width: 250px; border-right: 1px solid #ccc; padding-right: 20px; }
        #chat-box { flex: 1; padding-left: 20px; }
        .chat-item { padding: 10px; cursor: pointer; border-bottom: 1px solid #eee; }
        .chat-item:hover { background: #f5f5f5; }
        #messages { height: 300px; border: 1px solid #ccc; overflow-y: auto; padding: 10px; margin-bottom: 10px; }
        #input-area { display: flex; }
        #msg-input { flex: 1; padding: 5px; }
        button { padding: 5px 15px; margin-left: 5px; cursor: pointer; }
    </style>
</head>
<body>

    <div id="chat-list">
        <h3>客户列表</h3>
        <div id="list">加载中...</div>
    </div>

    <div id="chat-box">
        <h3>聊天窗口 (<span id="current-title">未选择</span>)</h3>
        <div id="messages"></div>
        <div id="input-area">
            <input type="text" id="msg-input" placeholder="输入消息..." onkeydown="if(event.keyCode==13) send()">
            <button onclick="send()">发送</button>
        </div>
    </div>

    <script>
        let currentChat = null;

        // 监听左侧聊天列表
        db.ref("chats").on("value", snap => {
            const data = snap.val();
            const listDiv = document.getElementById("list");
            listDiv.innerHTML = "";
            
            if (!data) {
                listDiv.innerHTML = "<span style='color:gray;'>暂无新消息</span>";
                return;
            }

            for (let id in data) {
                const div = document.createElement("div");
                div.className = "chat-item";
                div.innerText = id;
                div.onclick = () => loadChat(id);
                listDiv.appendChild(div);
            }
        });

        // 加载指定客户的聊天记录
        function loadChat(id) {
            currentChat = id;
            document.getElementById("current-title").innerText = id;
            const box = document.getElementById("messages");
            box.innerHTML = "";

            db.ref("chats/" + id + "/messages").off();

            db.ref("chats/" + id + "/messages").on("child_added", snap => {
                const msg = snap.val();
                const div = document.createElement("div");
                div.style.margin = "5px 0";
                
                if (msg.sender === "admin") {
                    div.innerHTML = `<p style="text-align:right; color:blue; margin:0;"><b>我:</b> ${msg.text}</p>`;
                } else {
                    div.innerHTML = `<p style="text-align:left; color:green; margin:0;"><b>粉丝:</b> ${msg.text}</p>`;
                }
                
                box.appendChild(div);
                box.scrollTop = box.scrollHeight;
            });
        }

        function send() {
            const input = document.getElementById("msg-input");
            const text = input.value.trim();
            if (!text || !currentChat) return;

            db.ref("chats/" + currentChat + "/messages").push({
                sender: "admin",
                text: text,
                timestamp: Date.now()
            });
            input.value = "";
        }
    </script>
</body>
</html>
