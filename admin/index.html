<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>客服后台管理大厅</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <script src="../firebase.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: #f0f2f5; display: flex; height: 100vh; overflow: hidden; }
        .sidebar { width: 280px; background: #fff; border-right: 1px solid #e8e8e8; display: flex; flex-direction: column; }
        .sidebar-header { padding: 15px; font-size: 16px; font-weight: bold; border-bottom: 1px solid #e8e8e8; background: #fafafa; }
        #list { flex: 1; overflow-y: auto; }
        .chat-item { padding: 15px; border-bottom: 1px solid #f0f0f0; cursor: pointer; transition: background 0.3s; font-size: 14px; color: #333; }
        .chat-item:hover, .chat-item.active { background: #e6f7ff; color: #1890ff; font-weight: bold; }
        .main-chat { flex: 1; display: flex; flex-direction: column; background: #f5f5f5; }
        .main-header { padding: 15px; background: #fff; font-size: 16px; font-weight: bold; border-bottom: 1px solid #e8e8e8; }
        #messages { flex: 1; padding: 20px; overflow-y: auto; background: #f4f5f7; }
        .msg-row { display: flex; margin-bottom: 15px; width: 100%; }
        .msg-row.admin { justify-content: flex-end; }
        .msg-row.user { justify-content: flex-start; }
        
        /* 头像样式 */
        .avatar { width: 36px; height: 36px; border-radius: 4px; margin: 0 10px; flex-shrink: 0; background-size: cover; background-position: center; }
        .user .avatar { background-image: url('https://img2.baidu.com/it/u=3093226316,2111005707&fm=253&fmt=auto&app=138&f=JPEG?w=500&h=500'); } /* 这里替换你的默认用户头像链接 */
        .admin .avatar { background-image: url('https://img2.baidu.com/it/u=1004169720,2962309831&fm=253&fmt=auto&app=138&f=JPEG?w=500&h=500'); } /* 这里替换你的默认客服头像链接 */

        .bubble { max-width: calc(65% - 46px); padding: 10px 14px; border-radius: 8px; font-size: 14px; line-height: 1.5; word-break: break-all; box-shadow: 0 1px 2px rgba(0,0,0,0.05); }
        .admin .bubble { background: #95ec69; color: #000; }
        .user .bubble { background: #fff; color: #000; }
        
        .bubble img { max-width: 100%; border-radius: 4px; margin-top: 5px; cursor: pointer; }
        .input-area { display: flex; align-items: center; padding: 15px; background: #fff; border-top: 1px solid #e8e8e8; }
        #msg-input { flex: 1; height: 40px; padding: 0 12px; border: 1px solid #d9d9d9; border-radius: 4px; outline: none; font-size: 14px; }
        .btn { height: 40px; border: none; border-radius: 4px; margin-left: 10px; cursor: pointer; font-size: 14px; display: flex; align-items: center; justify-content: center; }
        .btn-send { background: #00a854; color: white; padding: 0 24px; font-weight: bold; }
        .btn-file { background: #f5f5f5; color: #555; padding: 0 15px; font-size: 20px; border: 1px solid #d9d9d9; }
        #file-input { display: none; }
    </style>
</head>
<body>

    <div class="sidebar">
        <div class="sidebar-header">👥 粉丝接待大厅</div>
        <div id="list">加载中...</div>
    </div>

    <div class="main-chat">
        <div class="main-header">当前对话: <span id="current-title" style="color: #00a854;">未选择客户</span></div>
        <div id="messages"></div>
        <div class="input-area">
            <label class="btn btn-file" for="file-input">📎</label>
            <input type="file" id="file-input" accept="image/*,application/pdf" onchange="uploadFile(this)">
            <input type="text" id="msg-input" placeholder="输入回复内容..." onkeydown="if(event.keyCode==13) sendText()">
            <button class="btn btn-send" onclick="sendText()">发送</button>
        </div>
    </div>

    <script>
        let currentChat = null;

        db.ref("chats").on("value", snap => {
            const data = snap.val();
            const listDiv = document.getElementById("list");
            listDiv.innerHTML = "";
            if (!data) { listDiv.innerHTML = "<div style='padding:20px;color:gray;text-align:center;'>暂无新消息</div>"; return; }

            for (let id in data) {
                const div = document.createElement("div");
                div.className = "chat-item" + (currentChat === id ? " active" : "");
                div.innerText = "👤 用户: " + id.substring(5, 12) + "..."; // 简短截取展示
                div.onclick = () => {
                    document.querySelectorAll('.chat-item').forEach(el => el.classList.remove('active'));
                    div.classList.add('active');
                    loadChat(id);
                };
                listDiv.appendChild(div);
            }
        });

        function loadChat(id) {
            currentChat = id;
            document.getElementById("current-title").innerText = id;
            const box = document.getElementById("messages");
            box.innerHTML = "";

            db.ref("chats/" + id + "/messages").off();
            db.ref("chats/" + id + "/messages").on("child_added", snap => {
                const msg = snap.val();
                const row = document.createElement("div");
                row.className = "msg-row " + msg.sender;

                let content = msg.text;
                if (msg.type === "image") {
                    content = `<img src="${msg.url}" onclick="window.open('${msg.url}')" />`;
                } else if (msg.type === "file") {
                    content = `📄 <a href="${msg.url}" target="_blank" style="color:#00a854;">下载文件 (${msg.name})</a>`;
                }

                // 修改这里，加上头像
                if (msg.sender === "admin") {
                    row.innerHTML = `<div class="bubble">${content}</div><div class="avatar"></div>`;
                } else {
                    row.innerHTML = `<div class="avatar"></div><div class="bubble">${content}</div>`;
                }

                box.appendChild(row);
                box.scrollTop = box.scrollHeight;
            });
        }

        function sendText() {
            const input = document.getElementById("msg-input");
            const text = input.value.trim();
            if (!text || !currentChat) return;
            pushMsg({ sender: "admin", type: "text", text: text, timestamp: Date.now() });
            input.value = "";
        }

        function pushMsg(msgObj) {
            if (!currentChat) return;
            db.ref("chats/" + currentChat + "/messages").push(msgObj);
        }

        function uploadFile(input) {
            const file = input.files[0];
            if (!file || !currentChat) return;
            const formData = new FormData();
            formData.append("file", file);

            const inputField = document.getElementById("msg-input");
            inputField.placeholder = "文件上传中...";
            inputField.disabled = true;

            fetch("https://telegra.ph/upload", { method: "POST", body: formData })
                .then(res => res.json())
                .then(data => {
                    inputField.placeholder = "输入回复内容...";
                    inputField.disabled = false;
                    if (data && data[0] && data[0].src) {
                        const fileUrl = "https://telegra.ph" + data[0].src;
                        const isImg = file.type.startsWith("image/");
                        pushMsg({
                            sender: "admin",
                            type: isImg ? "image" : "file",
                            url: fileUrl,
                            name: file.name,
                            timestamp: Date.now()
                        });
                    }
                })
                .catch(err => {
                    alert("上传失败");
                    inputField.placeholder = "输入回复内容...";
                    inputField.disabled = false;
                });
        }
    </script>
</body>
</html>
